name: Deploy Mintlify to Pages

on:
  push:
    branches:
      - main

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: "pages"
  cancel-in-progress: false

jobs:
  deploy:
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: "20"

      - name: Install Mintlify & Unzip
        run: |
          npm install -g mintlify
          sudo apt-get update && sudo apt-get install -y unzip

      - name: Setup Pages
        uses: actions/configure-pages@v4

      - name: Build and Unpack Mintlify Docs
        working-directory: ./docs
        run: |
          mintlify export
          mkdir -p ../out
          unzip -o export.zip -d ../out
          touch ../out/.nojekyll

      - name: Upload artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: './out'

      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4